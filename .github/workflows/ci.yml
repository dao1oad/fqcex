name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  governance-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify governance files
        run: |
          test -f README.md
          test -f docs/roadmap/ROADMAP.md
          test -f docs/architecture/ARCHITECTURE.md
          test -f docs/architecture/STATE_MACHINE.md
          test -f docs/architecture/DATA_MODEL.md
          test -f docs/decisions/PHASE1_FREEZE.md
          test -f .github/PULL_REQUEST_TEMPLATE.md

  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install package
        run: python -m pip install -e '.[test]'
      - name: Run tests
        run: python -m pytest tests -q
